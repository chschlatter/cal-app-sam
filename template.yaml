AWSTemplateFormatVersion: 2010-09-09
Description: >-
  cal-app-sam

Transform:
  - AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 100
    Runtime: nodejs22.x
    MemorySize: 1024
    Architectures:
      - x86_64
    Environment:
      Variables:
        JWT_SECRET: !Sub "{{resolve:ssm:/${AWS::StackName}/JWT_SECRET}}"

Parameters:
  EnvType:
    Description: Environment type.
    Default: test
    Type: String
    AllowedValues:
      - prod
      - test
    ConstraintDescription: must specify prod or test.
  EventsNoLockTable:
    Type: String
    Description: The DynamoDB table name to store additional events
    Default: cal_events_no_lock_dev
  CFDistCNAME:
    Type: String
    Description: The CloudFront distribution CNAME
    Default: kalender-dev.schlatter.net
  CFDistViewerCertificate:
    Type: String
    Description: The CloudFront distribution viewer certificate
    Default: "arn:aws:acm:us-east-1:374093763622:certificate/1d31fe2a-19bf-4e16-b043-4b6ef02b31e6"

Conditions:
  CreateTestResources: !Equals
    - !Ref EnvType
    - test

Resources:
  # DynamoDB table to store events with LSI for start-date
  DbEventsNoLockTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref EventsNoLockTable
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: startDate
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      LocalSecondaryIndexes:
        - IndexName: startDateIndex
          KeySchema:
            - AttributeName: PK
              KeyType: HASH
            - AttributeName: startDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  calApi:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/calApi.handler
      Description: API Gateway for the calendar app
      Runtime: nodejs22.x
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsNoLockTable
      Environment:
        Variables:
          EVENTS_TABLE: !Ref EventsNoLockTable
          GOOGLE_CLIENT_ID: "{{resolve:ssm:/cal-app-sam/GOOGLE_CLIENT_ID}}"
      Events:
        RootPath:
          Type: Api
          Properties:
            Path: /
            Method: GET
            Auth:
              ResourcePolicy:
                CustomStatements:
                  - Effect: Allow
                    Principal: "*"
                    Action: execute-api:Invoke
                    Resource: execute-api:/*
        LoginPath:
          Type: Api
          Properties:
            Path: /login
            Method: ANY
        LoginProxy:
          Type: Api
          Properties:
            Path: /login/{proxy+}
            Method: ANY
        Api2Proxy:
          Type: Api
          Properties:
            Path: /api2/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        External: ["@aws-sdk"]

  # Lambda function for Google Sign-In authentication endpoint
  loginGSI:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/loginGSI.handler
      Description: Handle Google Sign-In authentication and return JWT cookie
      Runtime: nodejs22.x
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: "{{resolve:ssm:/cal-app-sam/GOOGLE_CLIENT_ID}}"
      Events:
        Api:
          Type: Api
          Properties:
            Path: /api2/loginGSI
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        External: ["@aws-sdk"]

  # Lambda function for backing up events to S3 (for LockDb)
  BackupEventsLockDbFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/backupEventsLockDb.handler
      Description: Functions to backup/restore events to/from S3
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventsNoLockTable
        - DynamoDBWritePolicy:
            TableName: !Ref EventsNoLockTable
        - S3WritePolicy:
            BucketName: !Ref BackupS3Bucket
        - S3ReadPolicy:
            BucketName: !Ref BackupS3Bucket
      Environment:
        Variables:
          EVENTS_TABLE: !Ref EventsNoLockTable
          BACKUP_BUCKET: !Ref BackupS3Bucket
          API_TOKEN: !Sub "{{resolve:ssm:/${AWS::StackName}/API_TOKEN}}"
      Events:
        BackupEvents:
          Type: Api
          Properties:
            Path: /api/events/backup
            Method: POST
        RestoreEvents:
          Type: Api
          Properties:
            Path: /api/events/restore
            Method: POST
        ScheduledBackup:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 * * ? *) # every day at 3am
            Name: !Sub "DailyBackupSchedule-${EnvType}"
            Description: "Trigger BackupEventsLockDbFunction once per day."
            Input: '{"type": "backup"}'
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        External: ["@aws-sdk"]

  # S3 bucket to store backups
  BackupS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-backups-${AWS::AccountId}"
      AccessControl: Private

Outputs:
  WebEndpoint:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
